<style>
  :root { --bg:#0f1226; --card:#1b1f3b; --accent:#5b8def; --good:#23c552; --bad:#e5484d; --text:#eef1ff; --muted:#9aa3c7; }
  * { box-sizing: border-box; }
  body {
    margin:0; min-height:100vh; font-family: "Segoe UI", system-ui, sans-serif;
    background: radial-gradient(circle at top, #232a5c, var(--bg));
    color: var(--text); display:flex; align-items:center; justify-content:center; padding:20px;
  }
  .app { width:100%; max-width:560px; }
  .card {
    background: var(--card); border-radius:20px; padding:28px;
    box-shadow: 0 20px 60px rgba(0,0,0,.45); text-align:center;
  }
  h1 { margin:0 0 6px; font-size:28px; }
  .sub { color: var(--muted); margin:0 0 22px; font-size:15px; }
  .topbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; font-size:15px; color:var(--muted); }
  .topbar b { color:var(--text); }
  .timer { font-weight:700; color:var(--text); }
  .timer.low { color:var(--bad); animation:pulse .6s infinite; }
  @keyframes pulse { 50% { opacity:.45; } }
  .progress { height:8px; background:#2a3060; border-radius:999px; overflow:hidden; margin-bottom:22px; }
  .progress > div { height:100%; width:0; background:var(--accent); transition:width .3s; }
  .flag-wrap { background:#fff; border-radius:14px; padding:14px; display:inline-block; margin-bottom:22px; }
  .flag-wrap img { display:block; width:300px; max-width:100%; height:auto; border-radius:6px; }
  .options { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .opt {
    padding:14px 10px; border:none; border-radius:12px; background:#2a3060; color:var(--text);
    font-size:15px; cursor:pointer; transition:transform .08s, background .2s; min-height:54px;
  }
  .opt:hover:not(:disabled) { background:#343c78; transform:translateY(-2px); }
  .opt:disabled { cursor:default; }
  .opt.correct { background:var(--good); color:#fff; }
  .opt.wrong { background:var(--bad); color:#fff; }
  .btn {
    margin-top:22px; padding:14px 28px; border:none; border-radius:12px; background:var(--accent);
    color:#fff; font-size:16px; font-weight:600; cursor:pointer; transition:filter .2s;
  }
  .btn:hover { filter:brightness(1.1); }
  .feedback { margin-top:16px; min-height:22px; font-weight:600; }
  .feedback.good { color:var(--good); }
  .feedback.bad { color:var(--bad); }
  .score-big { font-size:52px; font-weight:800; margin:10px 0; }
  .hidden { display:none; }
  .sound-toggle {
    position:fixed; top:16px; right:16px; width:44px; height:44px; border-radius:50%;
    border:none; background:var(--card); color:var(--text); font-size:20px; cursor:pointer;
    box-shadow:0 6px 18px rgba(0,0,0,.4); transition:filter .2s;
  }
  .sound-toggle:hover { filter:brightness(1.25); }
</style>
</head>
<body>
<button id="soundToggle" class="sound-toggle" onclick="toggleSound()" title="Turn sound on/off">🔊</button>
<div class="app">
  <!-- START SCREEN -->
  <div id="start" class="card">
    <h1>🌍 Guess the Flag</h1>
    <p class="sub">196 questions. Each shows a flag and 4 country names &mdash; pick the right one!</p>
    <button class="btn" onclick="startGame()">Start Quiz</button>
  </div>

  <!-- QUIZ SCREEN -->
  <div id="quiz" class="card hidden">
    <div class="topbar">
      <span>Question <b id="qNum">1</b> / 196</span>
      <span id="timer" class="timer">⏱ 15s</span>
      <span>Score: <b id="score">0</b></span>
    </div>
    <div class="progress"><div id="bar"></div></div>
    <div class="flag-wrap"><img id="flag" alt="flag to guess"></div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
    <button class="btn hidden" id="nextBtn" onclick="nextQuestion()">Next</button>
  </div>

  <!-- RESULT SCREEN -->
  <div id="result" class="card hidden">
    <h1>Quiz complete!</h1>
    <div class="score-big"><span id="finalScore">0</span> / 196</div>
    <p class="sub" id="resultMsg"></p>
    <button class="btn" onclick="startGame()">Play Again</button>
  </div>
</div>

<script>

  {n:'New Zealand',c:'nz'},{n:'Nicaragua',c:'ni'},{n:'Niger',c:'ne'},{n:'Nigeria',c:'ng'},

  {n:'Palau',c:'pw'},{n:'Panama',c:'pa'},{n:'Papua New Guinea',c:'pg'},{n:'Paraguay',c:'py'},

  {n:'Saint Kitts & Nevis',c:'kn'},{n:'Saint Lucia',c:'lc'},{n:'Samoa',c:'ws'},{n:'San Marino',c:'sm'},
  {n:'Sao Tome & Principe',c:'st'},{n:'Saudi Arabia',c:'sa'},{n:'Senegal',c:'sn'},{n:'Serbia',c:'rs'},
  {n:'Seychelles',c:'sc'},{n:'Sierra Leone',c:'sl'},{n:'Singapore',c:'sg'},{n:'Slovakia',c:'sk'},
  {n:'Slovenia',c:'si'},{n:'Solomon Islands',c:'sb'},{n:'Somalia',c:'so'},{n:'South Africa',c:'za'},
  {n:'South Korea',c:'kr'},{n:'South Sudan',c:'ss'},{n:'Spain',c:'es'},{n:'Sri Lanka',c:'lk'},
  {n:'St. Vincent & Grenadines',c:'vc'},{n:'State of Palestine',c:'ps'},{n:'Sudan',c:'sd'},{n:'Suriname',c:'sr'},
  {n:'Sweden',c:'se'},{n:'Switzerland',c:'ch'},{n:'Syria',c:'sy'},{n:'Tajikistan',c:'tj'},

  {n:'Tonga',c:'to'},{n:'Trinidad and Tobago',c:'tt'},{n:'Tunisia',c:'tn'},{n:'Turkey',c:'tr'},
  {n:'Turkmenistan',c:'tm'},{n:'Tuvalu',c:'tv'},{n:'United Arab Emirates',c:'ae'},{n:'United Kingdom',c:'gb'},
  {n:'United States',c:'us'},{n:'Uganda',c:'ug'},{n:'Ukraine',c:'ua'},{n:'Uruguay',c:'uy'},
  {n:'Uzbekistan',c:'uz'},{n:'Vanuatu',c:'vu'},{n:'Venezuela',c:'ve'},{n:'Vietnam',c:'vn'},
  {n:'Yemen',c:'ye'},{n:'Zambia',c:'zm'},{n:'Zimbabwe',c:'zw'},
  {n:'Somaliland',c:'somaliland',u:'https://upload.wikimedia.org/wikipedia/commons/thumb/4/4d/Flag_of_Somaliland.svg/330px-Flag_of_Somaliland.svg.png'}
];

const TOTAL = 196;
const TIME_LIMIT = 15;

// --- Sound effects (generated in the browser, no files needed) ---
let audioCtx = null;
let soundOn = true;

function initAudio() {
  if (!audioCtx) {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (AC) audioCtx = new AC();
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}

function beep(freq, duration, type, vol, delay) {
  if (!soundOn || !audioCtx) return;
  const t = audioCtx.currentTime + (delay || 0);
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0.0001, t);
  gain.gain.exponentialRampToValueAtTime(vol, t + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.0001, t + duration);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(t);
  osc.stop(t + duration + 0.03);
}

function playTick(urgent) { beep(urgent ? 1300 : 850, 0.05, 'square', urgent ? 0.16 : 0.06, 0); }
function playCorrect() { beep(660, 0.12, 'sine', 0.2, 0); beep(990, 0.2, 'sine', 0.2, 0.11); }
function playWrong() { beep(200, 0.3, 'sawtooth', 0.18, 0); beep(150, 0.35, 'sawtooth', 0.18, 0.09); }

function toggleSound() {
  soundOn = !soundOn;
  document.getElementById('soundToggle').textContent = soundOn ? '🔊' : '🔇';
  if (soundOn) initAudio();
}
let questions = [];
let current = 0;
let score = 0;
let timeLeft = TIME_LIMIT;
let timerId = null;

function stopTimer() {
  if (timerId) { clearInterval(timerId); timerId = null; }
}

function startTimer() {
  stopTimer();
  timeLeft = TIME_LIMIT;
  const el = document.getElementById('timer');
  el.textContent = '⏱ ' + timeLeft + 's';
  el.classList.remove('low');
  timerId = setInterval(() => {
    timeLeft--;
    el.textContent = '⏱ ' + timeLeft + 's';
    if (timeLeft <= 5) el.classList.add('low');
    if (timeLeft > 0) playTick(timeLeft <= 5);
    if (timeLeft <= 0) {
      stopTimer();
      timeUp();
    }
  }, 1000);
}

const flagUrl = country => country.u || `https://www.worldometers.info/images/flags/w320/${country.c}.webp`;

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildQuestions() {
  const picks = shuffle(COUNTRIES).slice(0, TOTAL);
  return picks.map(answer => {
    const wrongs = shuffle(COUNTRIES.filter(c => c.c !== answer.c)).slice(0, 3);
    return { answer, options: shuffle([answer, ...wrongs]) };
  });
}

function startGame() {
  initAudio();
  questions = buildQuestions();
  current = 0;
  score = 0;
  document.getElementById('start').classList.add('hidden');
  document.getElementById('result').classList.add('hidden');
  document.getElementById('quiz').classList.remove('hidden');
  document.getElementById('score').textContent = score;
  renderQuestion();
}

function renderQuestion() {
  const q = questions[current];
  document.getElementById('qNum').textContent = current + 1;
  document.getElementById('bar').style.width = ((current) / TOTAL * 100) + '%';
  document.getElementById('flag').src = flagUrl(q.answer);
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('nextBtn').classList.add('hidden');

  const box = document.getElementById('options');
  box.innerHTML = '';
  q.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.textContent = opt.n;
    btn.onclick = () => choose(btn, opt, q.answer);
    box.appendChild(btn);
  });
  startTimer();
}

function timeUp() {
  const buttons = document.querySelectorAll('.opt');
  buttons.forEach(b => b.disabled = true);
  const answer = questions[current].answer;
  buttons.forEach(b => { if (b.textContent === answer.n) b.classList.add('correct'); });
  playWrong();
  const fb = document.getElementById('feedback');
  fb.textContent = "Time's up! ⏱ It was " + answer.n;
  fb.className = 'feedback bad';
  document.getElementById('bar').style.width = ((current + 1) / TOTAL * 100) + '%';
  const nextBtn = document.getElementById('nextBtn');
  nextBtn.textContent = (current + 1 < TOTAL) ? 'Next' : 'See Results';
  nextBtn.classList.remove('hidden');
}

function choose(btn, opt, answer) {
  stopTimer();
  const buttons = document.querySelectorAll('.opt');
  buttons.forEach(b => b.disabled = true);
  const fb = document.getElementById('feedback');

  if (opt.c === answer.c) {
    btn.classList.add('correct');
    playCorrect();
    score++;
    document.getElementById('score').textContent = score;
    fb.textContent = 'Correct! ✅';
    fb.className = 'feedback good';
  } else {
    btn.classList.add('wrong');
    playWrong();
    buttons.forEach(b => { if (b.textContent === answer.n) b.classList.add('correct'); });
    fb.textContent = 'Wrong — it was ' + answer.n;
    fb.className = 'feedback bad';
  }
  document.getElementById('bar').style.width = ((current + 1) / TOTAL * 100) + '%';

  const nextBtn = document.getElementById('nextBtn');
  nextBtn.textContent = (current + 1 < TOTAL) ? 'Next' : 'See Results';
  nextBtn.classList.remove('hidden');
}

function nextQuestion() {
  current++;
  if (current < TOTAL) {
    renderQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  stopTimer();
  document.getElementById('quiz').classList.add('hidden');
  document.getElementById('result').classList.remove('hidden');
  document.getElementById('finalScore').textContent = score;
  const msgs = [
    [10, 'Perfect score! 🏆 Geography master!'],
    [8, 'Excellent! 🌟 You really know your flags.'],
    [6, 'Nice work! 👍 Solid knowledge.'],
    [4, 'Not bad — keep practicing! 🌍'],
    [0, 'Plenty of flags left to learn! 📚']
  ];
  document.getElementById('resultMsg').textContent = msgs.find(m => score >= m[0])[1];
}
</script>
